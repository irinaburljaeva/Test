<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Оценка склонности к отёкам</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <link rel="preload" href="low.jpg" as="image">
  <link rel="preload" href="medium.jpg" as="image">
  <link rel="preload" href="high.jpg" as="image">

  <style>
    :root {
      --red: #CF2C02;
      --red-light: #e54c00;
      --red-pale: #fff1ec;
      --text: #2d2d2d;
      --muted: #777;
      --border: #e8e0da;
      --bg: #faf7f5;
      --white: #fff;
      --radius: 16px;
      --shadow: 0 8px 32px rgba(207,44,2,0.10);
    }

    * { box-sizing: border-box; margin:0; padding:0 }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 560px;
      width: 100%;
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    /* HEADER */
    .header {
      background: var(--red);
      color: #fff;
      text-align: center;
      padding: 1.25rem 1.5rem 1rem;
    }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }
    .header p {
      font-size: 0.82rem;
      opacity: 0.85;
      margin-top: 0.3rem;
    }

    /* PROGRESS */
    .progress-wrap {
      background: var(--red-pale);
      padding: 0.6rem 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .progress {
      height: 6px;
      background: #e8deda;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar {
      width: 0;
      height: 100%;
      background: var(--red);
      border-radius: 99px;
      transition: width 0.45s cubic-bezier(.4,0,.2,1);
    }
    .step-dots {
      display: flex;
      gap: 5px;
      justify-content: center;
      padding: 0.5rem 0 0.6rem;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #e0d8d4;
      transition: background 0.3s, transform 0.3s;
    }
    .dot.active { background: var(--red); transform: scale(1.3); }
    .dot.done { background: #f5a46b; }

    /* SLIDE */
    .slide {
      padding: 2rem 1.5rem;
      opacity: 0;
      transform: translateX(18px);
      animation: slideIn 0.38s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }

    .question-label {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 0.4rem;
    }
    .slide h2 {
      font-size: 1.15rem;
      font-weight: 800;
      line-height: 1.4;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    /* OPTIONS */
    .options { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.2rem; }
    .option-label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1rem;
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      font-weight: 600;
      font-size: 0.95rem;
      user-select: none;
    }
    .option-label:hover { border-color: #f5a46b; background: var(--red-pale); transform: translateX(3px); }
    .option-label input[type=radio],
    .option-label input[type=checkbox] { display: none; }
    .option-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .option-dot::after {
      content: '';
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--white);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .option-label.selected {
      border-color: var(--red);
      background: var(--red-pale);
    }
    .option-label.selected .option-dot {
      border-color: var(--red);
      background: var(--red);
    }
    .option-label.selected .option-dot::after { opacity: 1; }

    /* Checkbox square */
    .option-sq { border-radius: 6px; }
    .option-sq::after { border-radius: 2px; }

    /* FIELDS (BMI) */
    .fields { display: flex; gap: 0.75rem; margin-bottom: 0.75rem; }
    .field-wrap { flex: 1; display: flex; flex-direction: column; gap: 0.3rem; }
    .field-wrap label { font-size: 0.75rem; font-weight: 700; color: var(--muted); }
    .fields input {
      padding: 0.65rem 0.75rem;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      text-align: center;
      transition: border-color 0.2s;
      width: 100%;
    }
    .fields input:focus { outline: none; border-color: var(--red); }
    #bmiResult {
      background: var(--red-pale);
      border-radius: 10px;
      padding: 0.65rem 1rem;
      font-weight: 800;
      font-size: 1rem;
      text-align: center;
      margin-bottom: 0.75rem;
      min-height: 2.5rem;
      color: var(--red);
    }

    /* SALT */
    #saltResult {
      background: var(--red-pale);
      border-radius: 10px;
      padding: 0.6rem 1rem;
      font-weight: 700;
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 0.75rem;
      min-height: 2rem;
    }

    /* BUTTONS */
    .btn-main {
      display: block; width: 100%;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      font-weight: 800;
      font-family: 'Nunito', sans-serif;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.18s, background 0.2s, box-shadow 0.2s;
      letter-spacing: 0.01em;
    }
    .btn-main:hover:not(:disabled) {
      transform: translateY(-2px);
      background: var(--red-light);
      box-shadow: 0 6px 20px rgba(207,44,2,0.25);
    }
    .btn-main:active:not(:disabled) { transform: translateY(0); }
    .btn-main:disabled { background: #f5c4b0; cursor: not-allowed; box-shadow: none; }

    .btn-ghost {
      display: block; width: 100%;
      padding: 0.65rem 1rem;
      font-size: 0.85rem;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      background: transparent;
      color: var(--muted);
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      margin-top: 0.6rem;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-ghost:hover { border-color: #ccc; color: var(--text); }

    /* WELCOME */
    .welcome-icon { font-size: 3rem; margin-bottom: 1rem; }
    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .chip {
      background: var(--red-pale);
      color: var(--red);
      padding: 0.3rem 0.75rem;
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    /* PHOTO */
    .photo-preview {
      width: 200px; height: 200px;
      margin: 0 auto 1rem;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      background: #f5f0ee;
      border: 4px solid var(--red);
      display: none;
      align-items: center;
      justify-content: center;
    }
    .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
    .scanner-line {
      position: absolute; left: 0; right: 0; height: 40%;
      background: linear-gradient(to bottom, rgba(207,44,2,0), rgba(207,44,2,0.35), rgba(207,44,2,0));
      transform: translateY(-100%);
      pointer-events: none;
    }
    .photo-preview.scanning .scanner-line {
      animation: scan 2.2s ease-in-out infinite;
    }
    @keyframes scan {
      0% { transform: translateY(-100%); }
      50% { transform: translateY(0); }
      100% { transform: translateY(100%); }
    }
    .photo-status {
      min-height: 1.6rem;
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
      text-align: center;
      font-weight: 600;
    }
    .btn-row { display: flex; gap: 0.5rem; margin-bottom: 0.6rem; }
    .btn-row .btn-main { margin: 0; }

    /* ===== RESULT ===== */
    .result {
      animation: slideIn 0.5s cubic-bezier(.4,0,.2,1) forwards;
    }

    .result-hero {
      position: relative;
      overflow: hidden;
    }
    .result-hero img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }
    .result-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 30%, transparent);
    }
    .result-badge {
      position: absolute;
      bottom: 1rem;
      left: 1.25rem;
      right: 1.25rem;
      color: #fff;
    }
    .result-badge h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      line-height: 1.3;
    }

    .result-body { padding: 1.5rem 1.5rem 0.5rem; }

    .result-tips {
      background: var(--red-pale);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      margin-bottom: 1.2rem;
    }
    .result-tips p {
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--red);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .result-tips ul { list-style: none; }
    .result-tips ul li {
      font-size: 0.92rem;
      line-height: 1.5;
      padding: 0.25rem 0;
      font-weight: 600;
    }

    /* INTENSIVE CARD */
    .intensive-card {
      background: linear-gradient(135deg, #CF2C02 0%, #a82200 100%);
      border-radius: 14px;
      padding: 1.3rem 1.25rem;
      color: #fff;
      margin-bottom: 1.2rem;
      position: relative;
      overflow: hidden;
    }
    .intensive-card::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 130px; height: 130px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }
    .intensive-card::after {
      content: '';
      position: absolute;
      bottom: -50px; left: -20px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }
    .intensive-card .badge-new {
      display: inline-block;
      background: #fff;
      color: var(--red);
      font-size: 0.68rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
      margin-bottom: 0.6rem;
    }
    .intensive-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      line-height: 1.25;
      margin-bottom: 0.3rem;
    }
    .intensive-card .start-date {
      font-size: 0.82rem;
      opacity: 0.85;
      margin-bottom: 1rem;
      font-weight: 700;
    }
    .intensive-features {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      margin-bottom: 1.1rem;
    }
    .intensive-features li {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.4;
      list-style: none;
    }
    .intensive-features li .ico { flex-shrink: 0; font-size: 1rem; }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .price-row .price-new {
      font-size: 1.6rem;
      font-weight: 900;
      line-height: 1;
    }
    .price-row .price-old {
      font-size: 0.9rem;
      opacity: 0.6;
      text-decoration: line-through;
    }
    .price-row .price-note {
      font-size: 0.78rem;
      opacity: 0.75;
      margin-left: auto;
    }

    .social-proof {
      font-size: 0.8rem;
      opacity: 0.8;
      margin-bottom: 0.9rem;
      font-weight: 600;
    }

    .btn-cta {
      display: block;
      width: 100%;
      padding: 0.95rem 1rem;
      background: #fff;
      color: var(--red);
      font-size: 1rem;
      font-weight: 900;
      font-family: 'Nunito', sans-serif;
      text-align: center;
      text-decoration: none;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.2s;
      letter-spacing: 0.01em;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .btn-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.2);
    }
    .btn-cta-sub {
      font-size: 0.75rem;
      font-weight: 600;
      opacity: 0.7;
      text-align: center;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .already-link {
      display: block;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      text-decoration: underline;
      margin-top: 0.25rem;
      cursor: pointer;
    }
    .already-link:hover { opacity: 0.9; }

    .result-footer {
      padding: 0 1.5rem 1.5rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Тест на склонность к отёкам</h1>
      <p>9 вопросов · ~2 минуты</p>
    </div>
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="stepLabel">Начало</span>
        <span id="stepCount"></span>
      </div>
      <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
      <div class="step-dots" id="stepDots"></div>
    </div>
    <div id="slideContainer"></div>
  </div>

  <script>
    const TOTAL_QUESTIONS = 9; // welcome not counted

    const slides = [
      { type:'welcome' },
      { type:'radio', name:'age', question:'Сколько вам лет?', options:[
        {text:'До 25 лет', value:0},
        {text:'26–35 лет', value:1},
        {text:'36–45 лет', value:2},
        {text:'Старше 45', value:3}
      ]},
      { type:'bmi', question:'Рассчитаем ваш ИМТ' },
      { type:'radio', name:'life', question:'Как бы вы описали свой образ жизни?', options:[
        {text:'Активна весь день', value:0},
        {text:'Сидячая работа + активный досуг', value:1},
        {text:'Преимущественно сидячий', value:2}
      ]},
      { type:'radio', name:'sport', question:'Как часто вы двигаетесь / тренируетесь?', options:[
        {text:'3+ раза в неделю', value:0},
        {text:'1–2 раза в неделю', value:1},
        {text:'Почти не тренируюсь', value:2}
      ]},
      { type:'radio', name:'cycle', question:'Какой сейчас день цикла?', options:[
        {text:'5–14 (фолликулярная фаза)', value:0},
        {text:'15–28 (лютеиновая фаза)', value:2},
        {text:'1–4 или нет цикла', value:1}
      ]},
      { type:'radio', name:'disease', question:'Есть ли у вас хронические заболевания?', options:[
        {text:'Нет', value:0},
        {text:'Есть, без выраженных симптомов', value:2},
        {text:'Есть, с симптомами', value:3}
      ]},
      { type:'radio', name:'meds', question:'Принимаете ли вы препараты регулярно?', options:[
        {text:'Нет', value:0},
        {text:'Иногда / витамины', value:1},
        {text:'Да, регулярно', value:2}
      ]},
      { type:'salt', question:'Что из этого вы едите почти каждый день?' },
      { type:'photo', question:'Визуальная оценка по фото лица' }
    ];

    const saltProducts = [
      {text:'Хлеб и выпечка', value:1},
      {text:'Сыры', value:2},
      {text:'Колбаса, сосиски, ветчина', value:2.5},
      {text:'Консервы', value:1.5},
      {text:'Фастфуд', value:3},
      {text:'Солёные снеки (чипсы, сухарики)', value:2},
      {text:'Маринованные продукты', value:2}
    ];

    let answers = {}, current = 0;
    const container = document.getElementById('slideContainer');
    const progressBar = document.getElementById('progressBar');
    const stepLabel = document.getElementById('stepLabel');
    const stepCount = document.getElementById('stepCount');
    const stepDots = document.getElementById('stepDots');

    // Build dots (for questions only, not welcome/result)
    const DOT_COUNT = TOTAL_QUESTIONS;
    for (let i = 0; i < DOT_COUNT; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      stepDots.append(d);
    }

    function updateProgress() {
      // current=0 → welcome, current=1..9 → questions 1..9
      const questionIndex = current - 1; // 0-based question index
      const pct = current <= 0 ? 0 : (current / TOTAL_QUESTIONS) * 100;
      progressBar.style.width = Math.min(pct, 100) + '%';

      if (current === 0) {
        stepLabel.textContent = 'Готовы начать?';
        stepCount.textContent = '';
      } else if (current <= TOTAL_QUESTIONS) {
        stepLabel.textContent = `Вопрос ${current}`;
        stepCount.textContent = `${current} / ${TOTAL_QUESTIONS}`;
      } else {
        stepLabel.textContent = 'Готово!';
        stepCount.textContent = '';
      }

      // Update dots
      const dots = stepDots.querySelectorAll('.dot');
      dots.forEach((d, i) => {
        d.classList.remove('active', 'done');
        if (i < questionIndex) d.classList.add('done');
        else if (i === questionIndex) d.classList.add('active');
      });
    }

    function render() {
      updateProgress();
      container.innerHTML = '';
      if (current > TOTAL_QUESTIONS) return showResult();

      const slide = slides[current];
      const el = document.createElement('div');
      el.className = 'slide';

      if (slide.type === 'welcome') {
        el.innerHTML = `
          <div style="text-align:center">
            <div class="welcome-icon">💧</div>
            <h2 style="margin-bottom:.75rem;font-size:1.25rem">Узнайте, насколько вы склонны к отёкам</h2>
            <p style="color:var(--muted);font-size:.92rem;margin-bottom:1.25rem;line-height:1.5">
              Ответьте на 9 вопросов и получите персональный анализ — и советы именно для вас.
            </p>
            <div class="welcome-chips">
              <span class="chip">⏱ 2 минуты</span>
              <span class="chip">🔒 Конфиденциально</span>
              <span class="chip">💡 Персональный результат</span>
            </div>
          </div>
        `;
        const btn = document.createElement('button');
        btn.className = 'btn-main';
        btn.textContent = 'Пройти тест';
        btn.onclick = () => { current++; render(); };
        el.append(btn);

      } else if (slide.type === 'radio') {
        const label = document.createElement('div');
        label.className = 'question-label';
        label.textContent = `Вопрос ${current}`;
        el.append(label);

        const q = document.createElement('h2');
        q.textContent = slide.question;
        el.append(q);

        const opts = document.createElement('div');
        opts.className = 'options';

        slide.options.forEach(o => {
          const lbl = document.createElement('label');
          lbl.className = 'option-label';
          lbl.innerHTML = `
            <input type="radio" name="${slide.name}" value="${o.value}">
            <span class="option-dot"></span>
            <span>${o.text}</span>
          `;
          lbl.querySelector('input').addEventListener('change', () => {
            opts.querySelectorAll('.option-label').forEach(l => l.classList.remove('selected'));
            lbl.classList.add('selected');
            btn.disabled = false;
          });
          opts.append(lbl);
        });
        el.append(opts);

        const btn = document.createElement('button');
        btn.className = 'btn-main';
        btn.textContent = current < TOTAL_QUESTIONS ? 'Далее →' : 'Завершить';
        btn.disabled = true;
        el.append(btn);

        btn.onclick = () => {
          answers[slide.name] = +opts.querySelector('input:checked').value;
          current++; render();
        };

      } else if (slide.type === 'bmi') {
        const label = document.createElement('div');
        label.className = 'question-label';
        label.textContent = `Вопрос ${current}`;
        el.append(label);

        const q = document.createElement('h2');
        q.textContent = slide.question;
        el.append(q);

        const hint = document.createElement('p');
        hint.style.cssText = 'font-size:.85rem;color:var(--muted);margin-bottom:1rem;line-height:1.5';
        hint.textContent = 'ИМТ помогает понять, как ваш вес влияет на склонность к задержке жидкости.';
        el.append(hint);

        const flex = document.createElement('div');
        flex.className = 'fields';
        flex.innerHTML = `
          <div class="field-wrap">
            <label>Вес, кг</label>
            <input id="weight" type="number" min="1" max="300" placeholder="65">
          </div>
          <div class="field-wrap">
            <label>Рост, см</label>
            <input id="height" type="number" min="100" max="250" placeholder="168">
          </div>
        `;
        el.append(flex);

        const bmiDisplay = document.createElement('div');
        bmiDisplay.id = 'bmiResult';
        bmiDisplay.textContent = 'Введите вес и рост';
        el.append(bmiDisplay);

        const btn = document.createElement('button');
        btn.className = 'btn-main';
        btn.textContent = 'Далее →';
        btn.disabled = true;
        el.append(btn);

        flex.addEventListener('input', () => {
          const w = parseFloat(flex.querySelector('#weight').value);
          const h = parseFloat(flex.querySelector('#height').value);
          if (w > 0 && h > 0) {
            const bmi = w / ((h / 100) ** 2);
            let emoji = bmi > 30 ? '🔴' : bmi > 25 ? '🟡' : '🟢';
            bmiDisplay.textContent = `${emoji} Ваш ИМТ: ${bmi.toFixed(1)}`;
            btn.disabled = false;
          } else {
            bmiDisplay.textContent = 'Введите вес и рост';
            btn.disabled = true;
          }
        });

        btn.onclick = () => {
          const w = +flex.querySelector('#weight').value;
          const h = +flex.querySelector('#height').value / 100;
          const bmi = w / (h * h);
          answers.bmi = bmi > 30 ? 3 : bmi > 25 ? 2 : bmi > 22 ? 1 : 0;
          current++; render();
        };

      } else if (slide.type === 'salt') {
        const label = document.createElement('div');
        label.className = 'question-label';
        label.textContent = `Вопрос ${current}`;
        el.append(label);

        const q = document.createElement('h2');
        q.textContent = slide.question;
        el.append(q);

        const hint = document.createElement('p');
        hint.style.cssText = 'font-size:.85rem;color:var(--muted);margin-bottom:1rem';
        hint.textContent = 'Выберите все подходящие варианты';
        el.append(hint);

        const opts = document.createElement('div');
        opts.className = 'options';

        saltProducts.forEach(p => {
          const lbl = document.createElement('label');
          lbl.className = 'option-label';
          lbl.innerHTML = `
            <input type="checkbox" value="${p.value}">
            <span class="option-dot option-sq"></span>
            <span>${p.text}</span>
          `;
          lbl.querySelector('input').addEventListener('change', () => {
            lbl.classList.toggle('selected', lbl.querySelector('input').checked);
            updateSalt();
          });
          opts.append(lbl);
        });
        el.append(opts);

        const saltRes = document.createElement('div');
        saltRes.id = 'saltResult';
        el.append(saltRes);

        const btn = document.createElement('button');
        btn.className = 'btn-main';
        btn.textContent = 'Завершить →';
        btn.disabled = true;
        el.append(btn);

        function updateSalt() {
          const checked = [...opts.querySelectorAll('input:checked')];
          if (checked.length) {
            const total = checked.reduce((sum, c) => sum + parseFloat(c.value), 0);
            let risk = total <= 5 ? '🟢 Норма' : total <= 8 ? '🟡 Чуть выше нормы' : '🔴 Высокое потребление соли';
            saltRes.textContent = `~${total.toFixed(1)} г соли в день · ${risk}`;
            answers.salt = total > 8 ? 2 : total > 5 ? 1 : 0;
            btn.disabled = false;
          } else {
            saltRes.textContent = '';
            btn.disabled = true;
          }
        }

        btn.onclick = () => { current++; render(); };

      } else if (slide.type === 'photo') {
        const label = document.createElement('div');
        label.className = 'question-label';
        label.textContent = `Вопрос ${current}`;
        el.append(label);

        const q = document.createElement('h2');
        q.textContent = slide.question;
        el.append(q);

        const info = document.createElement('p');
        info.style.cssText = 'font-size:.85rem;color:var(--muted);margin-bottom:1rem;line-height:1.55';
        info.innerHTML = `Загрузите фото лица в анфас — мы проведём визуальный анализ.<br>
          <strong style="color:var(--text)">Фото видите только вы</strong> — мы его не сохраняем и не передаём.`;
        el.append(info);

        const preview = document.createElement('div');
        preview.className = 'photo-preview';
        const previewImg = document.createElement('img');
        const scanner = document.createElement('div');
        scanner.className = 'scanner-line';
        preview.append(previewImg, scanner);
        el.append(preview);

        const status = document.createElement('div');
        status.className = 'photo-status';
        el.append(status);

        const inputGallery = document.createElement('input');
        inputGallery.type = 'file'; inputGallery.accept = 'image/*'; inputGallery.style.display = 'none';
        const inputCamera = document.createElement('input');
        inputCamera.type = 'file'; inputCamera.accept = 'image/*'; inputCamera.capture = 'user'; inputCamera.style.display = 'none';
        el.append(inputGallery, inputCamera);

        const btnRow = document.createElement('div');
        btnRow.className = 'btn-row';
        const btnGallery = document.createElement('button');
        btnGallery.className = 'btn-main'; btnGallery.textContent = '🖼 Из галереи';
        const btnCamera = document.createElement('button');
        btnCamera.className = 'btn-main'; btnCamera.textContent = '📷 Камера';
        btnRow.append(btnGallery, btnCamera);
        el.append(btnRow);

        const skipBtn = document.createElement('button');
        skipBtn.className = 'btn-ghost';
        skipBtn.textContent = 'Пропустить и получить результат';
        el.append(skipBtn);

        const startAnalysis = (file) => {
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            previewImg.src = reader.result;
            preview.style.display = 'flex';
            preview.classList.add('scanning');
          };
          reader.readAsDataURL(file);
          btnGallery.disabled = true; btnCamera.disabled = true; skipBtn.disabled = true;

          const steps = ['Загружаем изображение…', 'Анализируем контур лица…', 'Оцениваем зону под глазами…', 'Считаем отёчность…'];
          let step = 0;
          status.textContent = steps[step];
          const interval = setInterval(() => {
            step++;
            if (step < steps.length) {
              status.textContent = steps[step];
            } else {
              clearInterval(interval);
              status.textContent = '✅ Анализ завершён!';
              preview.classList.remove('scanning');
              setTimeout(() => { current++; render(); }, 700);
            }
          }, 800);
        };

        btnGallery.onclick = () => inputGallery.click();
        btnCamera.onclick = () => inputCamera.click();
        inputGallery.addEventListener('change', () => startAnalysis(inputGallery.files[0]));
        inputCamera.addEventListener('change', () => startAnalysis(inputCamera.files[0]));
        skipBtn.onclick = () => { current++; render(); };
      }

      container.append(el);
    }

    // ===== RESULT =====
    function showResult() {
      updateProgress();
      container.innerHTML = '';
      const sum = Object.values(answers).reduce((a, b) => a + b, 0);

      let level, img, title, desc, tips;

      if (sum <= 5) {
        level = 'low';
        img = 'low.jpg';
        title = '🎉 Низкая склонность к отёкам!';
        desc = 'Тело хорошо справляется с жидкостью. Отёки если и появляются — быстро уходят. Это отличный фундамент!';
        tips = [
          '🔸 Следите за потреблением соли — не превышайте 5 г в день',
          '🔸 Продолжайте двигаться — именно движение запускает лимфоток',
          '🔸 Поддерживайте водный баланс: 1,5–2 л воды в день'
        ];
      } else if (sum <= 10) {
        level = 'medium';
        img = 'medium.jpg';
        title = '🤗 Умеренная склонность к отёкам';
        desc = 'Отёки появляются на фоне цикла, питания, жары или долгого сидения. Хорошая новость — это легко скорректировать!';
        tips = [
          '🔸 Уменьшите натрий: уберите колбасы, сыры, снеки',
          '🔸 Добавьте 1–2 лимфодренажные тренировки в день',
          '🔸 Попробуйте самомассаж лица и ног — 5 минут утром'
        ];
      } else {
        level = 'high';
        img = 'high.jpg';
        title = '😔 Высокая склонность к отёкам';
        desc = 'Отёки частые и заметные. Это сигнал, что телу нужна поддержка — в питании, движении и лимфотоке.';
        tips = [
          '🔸 Проконсультируйтесь с врачом (кардиолог, эндокринолог)',
          '🔸 Резко сократите соль и переработанные продукты',
          '🔸 Начните с мягких ежедневных тренировок — не перегружайтесь'
        ];
      }

      const box = document.createElement('div');
      box.className = 'result';

      // Hero image
      box.innerHTML = `
        <div class="result-hero">
          <img src="${img}" alt="">
          <div class="result-hero-overlay"></div>
          <div class="result-badge">
            <h2>${title}</h2>
          </div>
        </div>
        <div class="result-body">
          <p style="font-size:.95rem;line-height:1.6;margin-bottom:1.1rem;font-weight:600;color:var(--muted)">${desc}</p>
          <div class="result-tips">
            <p>Советы для вас</p>
            <ul>${tips.map(t => `<li>${t}</li>`).join('')}</ul>
          </div>
        </div>
      `;

      // Selling block
      const selling = document.createElement('div');
      selling.style.padding = '0 1.5rem 1.5rem';

      const callout = level === 'low'
        ? `<p style="font-size:.95rem;line-height:1.6;margin-bottom:1rem;font-weight:700">Даже при низкой склонности к отёкам — перед летом самое время почувствовать тело лёгким и подтянутым. 2100+ участниц уже убедились: 7 дней меняют всё!</p>`
        : level === 'medium'
        ? `<p style="font-size:.95rem;line-height:1.6;margin-bottom:1rem;font-weight:700">Хорошая новость: при умеренной склонности результат приходит быстро — уже через 7 дней участницы замечают, что одежда сидит свободнее, лицо чётче, а к вечеру есть силы!</p>`
        : `<p style="font-size:.95rem;line-height:1.6;margin-bottom:1rem;font-weight:700">Именно для вас этот интенсив разработан особенно тщательно. Участницы с высокой склонностью к отёкам отмечают самые яркие результаты уже к 3–4 дню!</p>`;

      selling.innerHTML = callout;

      const card = document.createElement('div');
      card.className = 'intensive-card';
      card.innerHTML = `
        <span class="badge-new">⚡ Старт 13 апреля</span>
        <h3>Антиотечность 3.0</h3>
        <p class="start-date">Интенсив «Шагай Дома» · 7 дней · 15 минут в день</p>
        <ul class="intensive-features">
          <li><span class="ico">🚶‍♀️</span><span>14 лимфодренажных шагательных тренировок</span></li>
          <li><span class="ico">🥗</span><span>Вебинар + план питания «Антиотёк» от диетолога</span></li>
          <li><span class="ico">💆‍♀️</span><span>Уроки самомассажа лица и тела</span></li>
          <li><span class="ico">✨</span><span>Фейс-фитнес + лимфодренаж — подтяжка без уколов</span></li>
          <li><span class="ico">🩹</span><span>Тейп-терапия — впервые в клубе!</span></li>
          <li><span class="ico">📋</span><span>Диагностический гайд: какие анализы сдать</span></li>
        </ul>
        <div class="price-row">
          <span class="price-new">от 3 990 ₽</span>
          <span class="price-old">до 13 190 ₽</span>
          <span class="price-note">скидка до 65%</span>
        </div>
        <div class="social-proof">👩‍👩‍👧 2 100+ участниц уже прошли интенсив и довольны результатом</div>
        <a href="https://walk-walk.ru/swelling?utm_source=website&utm_medium=test&utm_campaign=oteki" class="btn-cta" target="_blank">
          Хочу на интенсив! →
        </a>
        <p class="btn-cta-sub">Доступна рассрочка · от 665 ₽/мес</p>
        <a href="https://my.walk-walk.ru/antiotek_shagai?utm_source=website&utm_medium=test&utm_campaign=oteki" class="already-link" target="_blank">У меня уже есть абонемент</a>
      `;

      selling.append(card);

      const footer = document.createElement('div');
      footer.className = 'result-footer';
      footer.textContent = 'Минус 2–4 кг воды · Чёткий овал лица · Лёгкость в теле к вечеру';

      box.querySelector('.result-body').after(selling);
      selling.after(footer);

      container.append(box);
    }

    render();
  </script>
</body>
</html>
